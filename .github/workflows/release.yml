name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install MinGW-w64
        run: choco install mingw -y

      - name: Build agent binaries
        shell: bash
        run: |
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          LDFLAGS="-X main.version=${VERSION}"

          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/certhound-agent-linux-amd64   ./cmd/agent
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/certhound-agent-linux-arm64   ./cmd/agent
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/certhound-agent-windows-amd64.exe ./cmd/agent

      - name: Build Windows installer
        shell: cmd
        run: |
          cd cmd\installer
          windres -o installer_res.syso installer.rc
          go build -ldflags="-H windowsgui" -o ..\..\dist\certhound-installer-windows-amd64.exe .

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum --text * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
